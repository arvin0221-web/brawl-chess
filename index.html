<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>西西西洋棋 - 完整升級版</title>

<link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">

<style>
body {
    font-family: Arial;
    background: #f0f2f5;
    text-align: center;
}

#myBoard {
    width: 400px;
    margin: 20px auto;
}

.controls button {
    padding: 10px;
    margin: 5px;
}

#chat-box {
    height: 200px;
    overflow-y: auto;
    border: 1px solid #ccc;
    margin-top: 10px;
}

#bigMessage {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 70px;
    font-weight: bold;
    color: red;
    background: rgba(0,0,0,0.85);
    padding: 30px;
    border-radius: 20px;
    display: none;
    z-index: 9999;
}
</style>
</head>

<body>

<h1>西西西洋棋</h1>

<input id="nameInput" placeholder="名字">
<input id="roomInput" placeholder="房間ID">
<button onclick="joinRoom()">加入房間</button>

<div id="myBoard"></div>
<div id="bigMessage"></div>

<div class="controls">
    <button onclick="chooseColor('w')">白棋</button>
    <button onclick="chooseColor('b')">黑棋</button>
    <button onclick="newGame()">新遊戲</button>
</div>

<div id="chat-box"></div>
<input id="chat-input">
<button onclick="sendMessage()">送出</button>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

<script>
// ================= Firebase =================
firebase.initializeApp({
  apiKey: "AIzaSyDzIXHlM0TyySFC7qNOsvFaD1X7uk58HXs",
  authDomain: "team-chess-2989a.firebaseapp.com",
  projectId: "team-chess-2989a",
  databaseURL: "https://team-chess-2989a-default-rtdb.firebaseio.com"
});

const db = firebase.database();

// ================= 基本 =================
let myId = "p_" + Math.random().toString(36).slice(2);
let playerName = "";
let playerColor = null;
let gameId = "default";

let gameRef, chatRef, playersRef;

let game = new Chess();
let board = null;
let selectedSquare = null;

// ================= 外掛 =================
const CHEATER = "XX";
function isCheater() {
    return playerName === CHEATER;
}

// ================= 房間 =================
function joinRoom() {
    playerName = document.getElementById("nameInput").value || "玩家";
    gameId = document.getElementById("roomInput").value || "default";

    gameRef = db.ref('games/' + gameId);
    chatRef = db.ref('games/' + gameId + '/chat');
    playersRef = db.ref('games/' + gameId + '/players');

    listen();
}

// ================= 顏色 =================
function chooseColor(c) {
    playersRef.once('value', s => {
        let p = s.val() || {};

        if (c === 'w' && (!p.white || p.white === myId)) {
            playersRef.update({white: myId});
            playerColor = 'w';
            board.orientation('white');
        }

        if (c === 'b' && (!p.black || p.black === myId)) {
            playersRef.update({black: myId});
            playerColor = 'b';
            board.orientation('black');
        }
    });
}

// ================= 監聽 =================
function listen() {

gameRef.on('value', s => {
    let d = s.val();
    if (!d) return;

    game.load(d.fen);
    board.position(d.fen);

    checkEnd();
});

chatRef.on('child_added', s => {
    let d = s.val();
    let div = document.createElement("div");
    div.innerText = d.name + ": " + d.msg;
    document.getElementById("chat-box").appendChild(div);
});

playersRef.on('value', s => {
    let p = s.val() || {};
    if (p.white === myId) playerColor = 'w';
    if (p.black === myId) playerColor = 'b';
});
}

// ================= 外掛移動 =================
function cheatMove(from, to) {
    let p = game.get(from);
    if (!p) return;

    game.remove(from);
    game.remove(to);
    game.put(p, to);
}

function kingSwap(from, to) {
    let a = game.get(from);
    let b = game.get(to);
    if (!a || !b) return;

    game.remove(from);
    game.remove(to);
    game.put(a, to);
    game.put(b, from);
}

// ================= 字幕 =================
function showBig(msg) {
    let el = document.getElementById("bigMessage");
    el.innerText = msg;
    el.style.display = "block";
    setTimeout(() => el.style.display = "none", 2500);
}

// ================= 落子核心 =================
function onDrop(from, to) {

let piece = game.get(from);

if (isCheater()) {

    if (piece && piece.type === "k") {
        let target = game.get(to);
        if (target) {
            kingSwap(from, to);

            let map = {
                q:"王后易位",
                r:"王車易位",
                n:"王馬易位",
                p:"王兵易位",
                b:"王教易位"
            };

            showBig("XX 使用了" + (map[target.type] || "未知易位"));
        }
    } else {
        cheatMove(from, to);
    }

    sync();
    return;
}

let move = game.move({from, to, promotion:'q'});
if (!move) return "snapback";

sync();
}

// ================= 同步 =================
function sync(){
    gameRef.set({
        fen: game.fen(),
        turn: game.turn()
    });
}

// ================= 點擊下棋 =================
document.addEventListener("click", e => {

let sq = e.target.getAttribute("data-square");
if (!sq) return;

if (!selectedSquare) {
    selectedSquare = sq;
} else {
    let move = game.move({from:selectedSquare, to:sq, promotion:'q'});
    if (move) sync();

    selectedSquare = null;
    board.position(game.fen());
}
});

// ================= 結束 =================
function checkEnd(){
    if (game.in_checkmate()) {
        showBig((game.turn()==='w'?'黑':'白') + " 勝利！");
    }
}

// ================= 新遊戲 =================
function newGame(){
    game.reset();
    gameRef.set({fen:game.fen(), turn:'w', players:{}});
}

// ================= 聊天 =================
function sendMessage(){
    let m = document.getElementById("chat-input").value;
    if (!m) return;

    chatRef.push({name:playerName, msg:m});
}

// ================= 棋盤 =================
board = Chessboard('myBoard',{
    draggable:true,
    position:'start',
    pieceTheme:'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
    onDrop:onDrop
});
</script>

</body>
</html>
