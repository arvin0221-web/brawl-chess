
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>西西西洋棋</title>

<link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">

<style>
body {
    font-family: Arial;
    background: #f0f2f5;
    text-align: center;
}

#myBoard {
    width: 400px;
    margin: 20px auto;
}

.controls button {
    padding: 10px;
    margin: 5px;
}

#chat-box {
    height: 200px;
    overflow-y: auto;
    border: 1px solid #ccc;
    margin-top: 10px;
}
</style>
</head>

<body>

<h1>西西西洋棋</h1>

<div id="myBoard"></div>
<p id="game-status"></p>

<div class="controls">
    <button id="new-game-btn">新遊戲</button>
    <button onclick="chooseColor('w')">選白棋</button>
    <button onclick="chooseColor('b')">選黑棋</button>
</div>

<div id="chat-box"></div>
<input id="chat-input">
<button onclick="sendMessage()">送出</button>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

<script>
// ✅ Firebase 初始化（最上面）
const firebaseConfig = {
  apiKey: "AIzaSyDzIXHlM0TyySFC7qNOsvFaD1X7uk58HXs",
  authDomain: "team-chess-2989a.firebaseapp.com",
  projectId: "team-chess-2989a",
  storageBucket: "team-chess-2989a.firebasestorage.app",
  messagingSenderId: "562832397441",
  appId: "1:562832397441:web:f98d61763cb8b1ac19e980",
  measurementId: "G-D9340S9MH1",
  databaseURL: "https://team-chess-2989a-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ✅ 基本變數
let myId = "player_" + Math.random().toString(36).substr(2, 9);
let playerColor = null;

const gameId = "main_chess_room";
const gameRef = db.ref('games/' + gameId);
const chatRef = db.ref('games/' + gameId + '/chat');
const playersRef = db.ref('games/' + gameId + '/players');

// ✅ 棋盤
var board = null;
var game = new Chess();

// ✅ 選顏色
function chooseColor(color) {
    playersRef.once('value', snap => {
        const players = snap.val() || {};

        if (color === 'w') {
            if (!players.white || players.white === myId) {
                playersRef.update({ white: myId });
                playerColor = 'w';
                alert("你是白棋");
                board.orientation('white');
            } else alert("白棋已被選走！");
        }

        if (color === 'b') {
            if (!players.black || players.black === myId) {
                playersRef.update({ black: myId });
                playerColor = 'b';
                alert("你是黑棋");
                board.orientation('black');
            } else alert("黑棋已被選走！");
        }
    });
}

// ✅ 自動同步顏色（重整不壞）
playersRef.on('value', snap => {
    const players = snap.val() || {};

    if (players.white === myId) {
        playerColor = 'w';
        board.orientation('white');
    } else if (players.black === myId) {
        playerColor = 'b';
        board.orientation('black');
    }
});

// ✅ 拖動限制
function onDragStart(source, piece) {

    if (game.game_over()) return false;

    if (!playerColor) {
        alert("請先選擇顏色");
        return false;
    }

    if (
        (playerColor === 'w' && piece.search(/^b/) !== -1) ||
        (playerColor === 'b' && piece.search(/^w/) !== -1)
    ) return false;

    if (game.turn() !== playerColor) return false;
}

// ✅ 落子
function onDrop(source, target) {
    var move = game.move({
        from: source,
        to: target,
        promotion: 'q'
    });

    if (move === null) return 'snapback';

    gameRef.update({
        fen: game.fen(),
        turn: game.turn()
    });
}

// ✅ 同步棋盤
gameRef.on('value', snap => {
    const data = snap.val();
    if (data && data.fen) {
        game.load(data.fen);
        board.position(data.fen);
    }
});

// ✅ 初始化
function newGame() {
    game.reset();
    gameRef.set({
        fen: game.fen(),
        turn: 'w',
        players: {}
    });
    playerColor = null;
}

// ✅ 聊天
function sendMessage() {
    let msg = document.getElementById("chat-input").value;
    if (!msg) return;

    chatRef.push({
        msg: msg,
        time: Date.now()
    });

    document.getElementById("chat-input").value = "";
}

chatRef.on('child_added', snap => {
    let data = snap.val();
    let div = document.createElement("div");
    div.innerText = data.msg;
    document.getElementById("chat-box").appendChild(div);
});

// ✅ 建立棋盤
board = Chessboard('myBoard', {
    draggable: true,
    position: 'start',
    onDragStart: onDragStart,
    onDrop: onDrop
});

// 按鈕
document.getElementById("new-game-btn").onclick = newGame;

</script>

</body>
</html>
