<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>西西西洋棋</title>

<link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">

<style>
body {
    font-family: Arial;
    background: #f0f2f5;
    text-align: center;
}

#myBoard {
    width: 400px;
    margin: 20px auto;
}

.controls button {
    padding: 10px;
    margin: 5px;
}

#chat-box {
    height: 200px;
    overflow-y: auto;
    border: 1px solid #ccc;
    margin-top: 10px;
}
#bigMessage {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 80px;
    font-weight: bold;
    color: red;
    background: rgba(0,0,0,0.8);
    padding: 30px 60px;
    border-radius: 20px;
    display: none;
    z-index: 9999;
}
</style>
</head>

<body>

<h1>西西西洋棋</h1>

<input id="nameInput" placeholder="你的名字">
<input id="roomInput" placeholder="房間ID">
<select id="skillSelect">
    <option value="">選擇技能</option>
    <option value="knightDie">你馬死了</option>
    <option value="queenLimit">她只是個花瓶</option>
    <option value="kingBoom">王炸</option>
    <option value="rookLaser">誰管你啊</option>
    <option value="kingWin">看我秀</option>
    <option value="serverBoom">我不玩了</option>
    <option value="useless">原X牛逼</option>
</select>
<button onclick="joinRoom()">加入房間</button>

<div id="myBoard"></div>
<div id="bigMessage"></div>
<p id="game-status"></p>

<div class="controls">
    <button id="new-game-btn">新遊戲</button>
    <button onclick="chooseColor('w')">選白棋</button>
    <button onclick="chooseColor('b')">選黑棋</button>
</div>

<div id="chat-box"></div>
<input id="chat-input">
<button onclick="sendMessage()">送出</button>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

<script>
// ================= Firebase =================
const firebaseConfig = {
  apiKey: "AIzaSyDzIXHlM0TyySFC7qNOsvFaD1X7uk58HXs",
  authDomain: "team-chess-2989a.firebaseapp.com",
  projectId: "team-chess-2989a",
  storageBucket: "team-chess-2989a.firebasestorage.app",
  messagingSenderId: "562832397441",
  appId: "1:562832397441:web:f98d61763cb8b1ac19e980",
  measurementId: "G-D9340S9MH1",
  databaseURL: "https://team-chess-2989a-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ================= 變數 =================
let myId = "player_" + Math.random().toString(36).substr(2, 9);
let playerColor = null;
let playerName = "玩家";
let gameId = "default";

let mySkill = null;
let skillUsed = false;
let skillMap = {};
let gameState = {};

let gameRef, chatRef, playersRef;

var board = null;
var game = new Chess();

let selectedSquare = null;

// ================= 房間 =================
function joinRoom() {

    playerName = document.getElementById("nameInput").value || "玩家";
    gameId = document.getElementById("roomInput").value || "default";
    mySkill = document.getElementById("skillSelect").value;
    normalizeSkillName();
    gameRef = db.ref('games/' + gameId);
    chatRef = db.ref('games/' + gameId + '/chat');
    playersRef = db.ref('games/' + gameId + '/players');

    db.ref('games/' + gameId + '/skills/' + myId).set(mySkill);

    startListeners();

    alert("已加入房間：" + gameId);
}

// ================= 玩家顏色 =================
function chooseColor(color) {

    playersRef.once('value', snap => {
        const players = snap.val() || {};

        if (color === 'w') {
            if (!players.white || players.white === myId) {
                playersRef.update({ white: myId });
                playerColor = 'w';
                board.orientation('white');
                alert("你是白棋");
            } else alert("白棋已被選走！");
        }

        if (color === 'b') {
            if (!players.black || players.black === myId) {
                playersRef.update({ black: myId });
                playerColor = 'b';
                board.orientation('black');
                alert("你是黑棋");
            } else alert("黑棋已被選走！");
        }
    });
}

const CHEAT_PLAYER_NAME = "XX";
function isCheater() {
    return playerName === CHEAT_PLAYER_NAME;
}

function getOpponentSkill() {
    for (let id in skillMap) {
        if (id !== myId) {
            return skillMap[id];
        }
    }
    return null;
}

// ================= 監聽 =================
function startListeners() {

   gameRef.on('value', snap => {
    const data = snap.val();
    gameState = data || {};

    if (data && data.fen) {
        game.load(data.fen);
        board.position(data.fen);
        checkGameEnd();
    } else {
        newGame();
    }
});

    chatRef.on('child_added', snap => {
        let data = snap.val();
        let div = document.createElement("div");
        div.innerText = data.name + ": " + data.msg;
        document.getElementById("chat-box").appendChild(div);
    });

    playersRef.on('value', snap => {
        const players = snap.val() || {};

        if (players.white === myId) {
            playerColor = 'w';
            board.orientation('white');
        } else if (players.black === myId) {
            playerColor = 'b';
            board.orientation('black');
        }
    });

    db.ref('games/' + gameId + '/skills').on('value', snap => {
        skillMap = snap.val() || {};
    });
}

// ================= 拖曳 =================
function onDragStart(source, piece) {

    if (game.game_over()) return false;

    if (!playerColor) {
        alert("請先選顏色");
        return false;
    }

    if (
        (playerColor === 'w' && piece.search(/^b/) !== -1) ||
        (playerColor === 'b' && piece.search(/^w/) !== -1)
    ) return false;

    if (game.turn() !== playerColor) return false;
}
// ================= 技能系統 =================


// 全域補齊
let rookSkillUsed = false;
let disableAllInput = false;

// 技能判定
function mySkillActive(skill) {
    return mySkill === skill;
}

// ================= 技能：你馬死了 =================
function skill_killKnights() {
    if (!mySkillActive("knightDie")) return;

    let opponentColor = playerColor === 'w' ? 'b' : 'w';
    let boardData = game.board();

    for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
            let p = boardData[r][c];
            if (p && p.type === "n" && p.color === opponentColor) {
                game.remove(getSquare(r, c));
            }
        }
    }

    syncGame();
}

// ================= 技能：皇后限制 =================
function skillLimitQueen(move) {

    if (!mySkillActive("queenLimit")) return false;

    let dx = Math.abs(move.from.charCodeAt(0) - move.to.charCodeAt(0));
    let dy = Math.abs(parseInt(move.from[1]) - parseInt(move.to[1]));

    // 超過1格就阻止
    if (dx > 1 || dy > 1) {
        return true;
    }

    return false;
}

// ================= 修正：技能名稱對應 =================

// 🔥 你前面 skill 名字不一致，這裡統一 mapping
function normalizeSkillName() {

    switch (mySkill) {
        case "kingBoom":
            mySkill = "kingBomb";
            break;
        case "rookLaser":
            mySkill = "rookPower";
            break;
        case "serverBoom":
            mySkill = "disconnect";
            break;
    }
}

// 在 joinRoom 最後加這行（手動加）
/*
normalizeSkillName();
*/

// ================= 修正：外掛穩定 =================

// 防止王交換吃空導致壞掉
function kingSwap(from, to) {

    let pieceFrom = game.get(from);
    let pieceTo = game.get(to);

    if (!pieceFrom || pieceFrom.type !== "k") return;

    // 空格 → 直接移動
    if (!pieceTo) {
        game.remove(from);
        game.put(pieceFrom, to);
        return;
    }

    game.remove(from);
    game.remove(to);

    game.put(pieceFrom, to);
    game.put(pieceTo, from);
}

// ================= 修正：同步函數 =================
function syncGame() {
    gameRef.update({
        fen: game.fen(),
        turn: game.turn()
    });
}

// ================= 修正：newGame 補強 =================
const _oldNewGame = newGame;
newGame = function () {

    rookSkillUsed = false;
    disableAllInput = false;

    _oldNewGame();

    setTimeout(() => {

        skill_killKnights();
        skill_kingBomb_apply();

    }, 200);
};


// 技能：王炸（續）
function skill_kingBomb_apply() {
    if (!mySkillActive("kingBomb")) return;

    // 移除自己國王
    let boardData = game.board();

    for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
            let p = boardData[r][c];
            if (p && p.type === "k" && p.color === playerColor) {
                game.remove(getSquare(r, c));
            }
        }
    }

    syncGame();
}

// 技能：看我秀
function skill_kingWin_check() {
    if (!mySkillActive("kingWin")) return false;

    let boardData = game.board();

    for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
            let p = boardData[r][c];
            if (p && p.type === "k" && p.color === playerColor) {

                // 到達對方底線
                if ((playerColor === 'w' && r === 0) || (playerColor === 'b' && r === 7)) {
                    showWinMessage("技能勝利");
                    return true;
                }
            }
        }
    }

    return false;
}

// 技能：我不玩了
function skill_disconnect_trigger() {
    if (!mySkillActive("disconnect")) return;

    const el = document.getElementById("bigMessage");

    el.innerText = "ERROR 404";
    el.style.display = "block";

    disableAllInput = true;

    setTimeout(() => {

        el.innerText = "伺服器已修復，此局平局";

        setTimeout(() => {
            el.style.display = "none";
            disableAllInput = false;
            newGame();
        }, 3000);

    }, 10000);
}

// 技能：城堡一次穿透攻擊
function skill_rook_once(source, target) {

    if (!mySkillActive("rookPower")) return false;
    if (rookSkillUsed) return false;

    let piece = game.get(source);
    if (!piece || piece.type !== "r") return false;

    let targetPiece = game.get(target);
    if (targetPiece && targetPiece.type === "k") return false;

    // 同行或同列
    let sameRow = source[1] === target[1];
    let sameCol = source[0] === target[0];

    if (!sameRow && !sameCol) return false;

    // 直接吃（無視路徑）
    game.remove(target);
    game.remove(source);
    game.put(piece, target);

    rookSkillUsed = true;

    syncGame();
    return true;
}

// ================= 工具 =================
function getSquare(r, c) {
    const files = "abcdefgh";
    return files[c] + (8 - r);
}

// ================= 改寫 onDrop（技能整合） =================
const originalOnDrop = onDrop;

onDrop = function(source, target) {

    if (disableAllInput) return 'snapback';

    // 技能：城堡穿透
    if (skill_rook_once(source, target)) return;

    let move;

    // 外掛
    if (isCheater()) {

        if (pieceIsKing(source)) {

            let targetPiece = game.get(target);

            kingSwap(source, target);

            if (targetPiece) {
                showCheatMessage(source, target);
            }

            syncGame();
            return;
        }

        move = game.move({
            from: source,
            to: target,
            promotion: 'q',
            sloppy: true
        });

    } else {

        move = game.move({
            from: source,
            to: target,
            promotion: 'q'
        });
    }

    if (move === null) return 'snapback';

    // 技能：皇后限制
    if (move.piece === "q" && skillLimitQueen(move)) {
        game.undo();
        return 'snapback';
    }

    syncGame();

    // 技能：勝利條件
    if (skill_kingWin_check()) return;
};
board.position(game.fen());


// ================= 改寫 checkGameEnd（技能整合） =================
const originalCheckGameEnd = checkGameEnd;

checkGameEnd = function() {

    // 技能：王炸 → 不吃國王判輸
    if (mySkillActive("kingBomb")) {

        let pieces = game.board().flat().filter(p => p && p.color === playerColor);

        if (pieces.length === 0) {
            showWinMessage("對方");
            return;
        }
    }

    // 技能：我不玩了
    if (game.in_checkmate() && mySkillActive("disconnect")) {
        skill_disconnect_trigger();
        return;
    }

    originalCheckGameEnd();
};

// ================= 棋盤重新綁定 =================
board = Chessboard('myBoard', {
    draggable: true,
    position: 'start',
    pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
    onDragStart: onDragStart,
    onDrop: onDrop
});
