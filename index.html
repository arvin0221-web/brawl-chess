<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>西西西洋棋</title>

<link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">

<style>
body {
    font-family: Arial;
    background: #f0f2f5;
    text-align: center;
}

#myBoard {
    width: 400px;
    margin: 20px auto;
}

.controls button {
    padding: 10px;
    margin: 5px;
}

#chat-box {
    height: 200px;
    overflow-y: auto;
    border: 1px solid #ccc;
    margin-top: 10px;
}
#bigMessage {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 80px;
    font-weight: bold;
    color: red;
    background: rgba(0,0,0,0.8);
    padding: 30px 60px;
    border-radius: 20px;
    display: none;
    z-index: 9999;
}
</style>
</head>

<body>

<h1>西西西洋棋</h1>

<!-- 🔥 房間 + 名字 -->
<input id="nameInput" placeholder="你的名字">
<input id="roomInput" placeholder="房間ID">
<button onclick="joinRoom()">加入房間</button>

<div id="myBoard"></div>
<div id="bigMessage"></div>
<p id="game-status"></p>

<div class="controls">
    <button id="new-game-btn">新遊戲</button>
    <button onclick="chooseColor('w')">選白棋</button>
    <button onclick="chooseColor('b')">選黑棋</button>
</div>

<div id="chat-box"></div>
<input id="chat-input">
<button onclick="sendMessage()">送出</button>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

<script>
// ================= Firebase =================
const firebaseConfig = {
  apiKey: "AIzaSyDzIXHlM0TyySFC7qNOsvFaD1X7uk58HXs",
  authDomain: "team-chess-2989a.firebaseapp.com",
  projectId: "team-chess-2989a",
  storageBucket: "team-chess-2989a.firebasestorage.app",
  messagingSenderId: "562832397441",
  appId: "1:562832397441:web:f98d61763cb8b1ac19e980",
  measurementId: "G-D9340S9MH1",
  databaseURL: "https://team-chess-2989a-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ================= 變數 =================
let myId = "player_" + Math.random().toString(36).substr(2, 9);
let playerColor = null;
let playerName = "玩家";
let gameId = "default";

let gameRef, chatRef, playersRef;

var board = null;
var game = new Chess();

let selectedSquare = null;

// ================= 房間 =================
function joinRoom() {

    playerName = document.getElementById("nameInput").value || "玩家";
    gameId = document.getElementById("roomInput").value || "default";

    gameRef = db.ref('games/' + gameId);
    chatRef = db.ref('games/' + gameId + '/chat');
    playersRef = db.ref('games/' + gameId + '/players');

    startListeners();

    alert("已加入房間：" + gameId);
}

// ================= 玩家顏色 =================
function chooseColor(color) {

    playersRef.once('value', snap => {
        const players = snap.val() || {};

        if (color === 'w') {
            if (!players.white || players.white === myId) {
                playersRef.update({ white: myId });
                playerColor = 'w';
                board.orientation('white');
                alert("你是白棋");
            } else alert("白棋已被選走！");
        }

        if (color === 'b') {
            if (!players.black || players.black === myId) {
                playersRef.update({ black: myId });
                playerColor = 'b';
                board.orientation('black');
                alert("你是黑棋");
            } else alert("黑棋已被選走！");
        }
    });
}
const CHEAT_PLAYER_NAME = "XX"; // 👈 有外掛的人
function isCheater() {
    return playerName === CHEAT_PLAYER_NAME;
}
// ================= 監聽 =================
function startListeners() {

   gameRef.on('value', snap => {
    const data = snap.val();

    if (data && data.fen) {
        game.load(data.fen);
        board.position(data.fen);

        // 🔥 加在這裡
        checkGameEnd();
    } else {
        newGame();
    }
});

    chatRef.on('child_added', snap => {
        let data = snap.val();
        let div = document.createElement("div");
        div.innerText = data.name + ": " + data.msg;
        document.getElementById("chat-box").appendChild(div);
    });

    playersRef.on('value', snap => {
        const players = snap.val() || {};

        if (players.white === myId) {
            playerColor = 'w';
            board.orientation('white');
        } else if (players.black === myId) {
            playerColor = 'b';
            board.orientation('black');
        }
    });
}

// ================= 拖曳 =================
function onDragStart(source, piece) {

    if (game.game_over()) return false;

    if (!playerColor) {
        alert("請先選顏色");
        return false;
    }

    if (
        (playerColor === 'w' && piece.search(/^b/) !== -1) ||
        (playerColor === 'b' && piece.search(/^w/) !== -1)
    ) return false;

    if (game.turn() !== playerColor) return false;
}

// ================= 落子 =================
function onDrop(source, target) {
    let move;

    // ================= 外掛模式 =================
    if (isCheater()) {

        // 王可以任意交換
        if (pieceIsKing(source)) {
            kingSwap(source, target);

            let targetPiece = game.get(target);

            if (targetPiece) {
                showCheatMessage(source, target);
            }

            syncGame();
            return;
        }

        // 一般作弊移動（無視規則）
        move = game.move({
            from: source,
            to: target,
            promotion: 'q',
            sloppy: true
        });

    } else {

        // ================= 正常模式 =================
        move = game.move({
            from: source,
            to: target,
            promotion: 'q'
        });
    }

    if (move === null) return 'snapback';

    gameRef.update({
        fen: game.fen(),
        turn: game.turn()
    });
}
function kingSwap(from, to) {

    let pieceFrom = game.get(from);
    let pieceTo = game.get(to);

    if (!pieceFrom || !pieceTo) return;
    // ❗避免王消失
    if (pieceFrom.type !== "k") return;
    game.remove(from);
    game.remove(to);

    game.put(pieceFrom, to);
    game.put(pieceTo, from);
}

function pieceIsKing(square) {
    let p = game.get(square);
    return p && p.type === "k";
}
function showCheatMessage(from, to) {

    const el = document.getElementById("bigMessage");

    let targetPiece = game.get(to);
    if (!targetPiece) return;

    let msg = "XX 使用了牛逼易位";

    switch (targetPiece.type) {

        case "q":
            msg = "XX 使用了王后易位";
            break;

        case "r":
            msg = "XX 使用了王車易位";
            break;

        case "n":
            msg = "XX 使用了王馬易位";
            break;

        case "p":
            msg = "XX 使用了王兵易位";
            break;

        case "b":
            msg = "XX 使用了王教易位";
            break;
    }

    el.innerText = msg;
    el.style.display = "block";

    setTimeout(() => {
        el.style.display = "none";
    }, 2000);
}

    el.innerText = msg;
    el.style.display = "block";

    setTimeout(() => {
        el.style.display = "none";
    }, 2500);
}
    function syncGame() {
    gameRef.update({
        fen: game.fen(),
        turn: game.turn()
    });
}
// ================= 點擊下棋（🔥新） =================
document.addEventListener("click", function(e){

    let square = e.target.getAttribute("data-square");
    if (!square) return;

    if (!playerColor) return;

    if (!selectedSquare) {
        selectedSquare = square;
    } else {

        let move = game.move({
            from: selectedSquare,
            to: square,
            promotion: 'q'
        });

        if (move) {
            gameRef.update({
                fen: game.fen(),
                turn: game.turn()
            });
        }

        selectedSquare = null;
        board.position(game.fen());
    }
});
function showWinMessage(winner) {
    const el = document.getElementById("bigMessage");

    el.innerText = winner + " 勝利！";
    el.style.display = "block";

    // 🔥 3秒後消失
    setTimeout(() => {
        el.style.display = "none";
    }, 3000);
}
function checkGameEnd() {

    const el = document.getElementById("bigMessage");

    // 🔥 將殺
    if (game.in_checkmate()) {
        let winner = (game.turn() === 'w') ? "黑棋" : "白棋";
        showWinMessage(winner);
        return;
    }

    // 🔥 和局
    if (game.in_draw()) {
        el.innerText = "和局！";
        el.style.display = "block";
        return;
    }

    // 🔥 沒結束 → 隱藏
    el.style.display = "none";
}
// ================= 新遊戲 =================
function newGame() {
    game.reset();

    gameRef.set({
        fen: game.fen(),
        turn: 'w',
        players: {}
    });

    playerColor = null;
}

// ================= 聊天 =================
function sendMessage() {
    let msg = document.getElementById("chat-input").value;
    if (!msg) return;

    chatRef.push({
        name: playerName,
        msg: msg,
        time: Date.now()
    });

    document.getElementById("chat-input").value = "";
}

// ================= 棋盤 =================
board = Chessboard('myBoard', {
    draggable: true,
    position: 'start',
    pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
    onDragStart: onDragStart,
    onDrop: onDrop
});

// ================= 按鈕 =================
document.getElementById("new-game-btn").onclick = newGame;

</script>

</body>
</html>
